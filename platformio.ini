[env:nucleo_l432kc]
platform = ststm32
board = nucleo_l432kc
framework = stm32cube
build_flags = 
    -DUSE_HAL_DRIVER
    -DSTM32L432xx

    ; Your own headers (ffconf.h, main.h, sd_diskio.h, etc.)
   ; -Isrc/SDCard
 
    ; FatFs middleware headers (ff.h, diskio.h, ff_gen_drv.h, etc.)
    ;-I${platformio.packages_dir}/framework-stm32cubel4/Middlewares/Third_Party/FatFs/src
 
    ; FatFs driver glue (ff_gen_drv.c lives here too)
    ;-I${platformio.packages_dir}/framework-stm32cubel4/Middlewares/Third_Party/FatFs/src/drivers



; build_type = debug
; monitor_port = /dev/ttyACM0
; monitor_speed = 9600


board_build.stm32cube.startup_file = startup_stm32l432xx.s
board_build.stm32cube.system_file  = system_stm32l4xx.c



